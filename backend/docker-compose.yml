services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moomoo-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/moomoo
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      AI_SERVICE_URL: http://ai-backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ai-backend

  ai-backend:
    build:
      context: ../ai-backend
      dockerfile: Dockerfile
    container_name: moomoo-ai-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      AI_SERVICE_NAME: moomoo-ai-backend
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    container_name: moomoo-postgres
    environment:
      POSTGRES_DB: moomoo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
