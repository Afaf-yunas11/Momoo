spring:
  application:
    name: moomoo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/moomoo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: true
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:30}
  bootstrap:
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@moomoo.local}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
